name: Check DB Counts on EC2

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Count rows
        id: ssm
        run: |
          cat > /tmp/check.json << 'EOF'
          {"commands": [
            "cd /opt/evn-warp",
            "node -e \"const {createClient}=require('@libsql/client');const c=createClient({url:'file:./dev.db'});(async(){const ts=['Team','StrategyTask','KpiItem','MonthlyTarget','Countermeasure','WorkActivity','WeeklyUpdate','CompanyKpi','CompanyKpiEntry'];for(const t of ts){try{const r=await c.execute('SELECT COUNT(*) as cnt FROM \\\"'+t+'\\\"');console.log(t+': '+r.rows[0].cnt);}catch(e){console.log(t+': ERROR '+e.message);}}})();\""
          ]}
          EOF

          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "EVN-WARP DB count check" \
            --timeout-seconds 60 \
            --parameters file:///tmp/check.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "Command: $command_id"

      - name: Get result
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          for i in $(seq 1 15); do
            status="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)"
            echo "[$i] $status"
            case "$status" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 5
          done
          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardOutputContent --output text || true
          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardErrorContent --output text || true
