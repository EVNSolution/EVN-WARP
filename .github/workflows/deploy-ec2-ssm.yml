name: Deploy EC2 via SSM

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy'
        required: true
        default: 'main'
      run_setup:
        description: 'Install/repair EC2 prerequisites before deploy'
        type: boolean
        required: true
        default: true
      run_db_push:
        description: 'Run prisma db push on EC2'
        type: boolean
        required: true
        default: true
      issue_cert:
        description: 'Run certbot for SERVER_NAME when DNS is ready'
        type: boolean
        required: true
        default: false
      server_name:
        description: 'Nginx/Certbot server name'
        required: true
        default: 'warp.cleversystem.ai'

concurrency:
  group: deploy-ec2-ssm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  APP_ENV: ${{ secrets.APP_ENV }}
  DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
  CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
  SSM_APP_ENV_PARAM: /evn-warp/app-env
  SSM_GITHUB_TOKEN_PARAM: /evn-warp/github-token
  APP_DIR: /opt/evn-warp
  REPO_URL: https://github.com/EVNSolution/EVN-WARP.git
  PM2_APP_NAME: evn-warp
  PORT: '3000'

jobs:
  deploy:
    name: Manual deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials with OIDC
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "$AWS_REGION" || { echo 'Missing secret: AWS_REGION'; exit 1; }
          test -n "$EC2_INSTANCE_ID" || { echo 'Missing secret: EC2_INSTANCE_ID'; exit 1; }
          if [ -z "$AWS_ROLE_ARN" ] && { [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; }; then
            echo 'Set AWS_ROLE_ARN, or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.'
            exit 1
          fi

      - name: Sync optional secure parameters
        run: |
          set -euo pipefail
          if [ -n "$APP_ENV" ]; then
            aws ssm put-parameter \
              --name "$SSM_APP_ENV_PARAM" \
              --type SecureString \
              --value "$APP_ENV" \
              --overwrite >/dev/null
          fi
          if [ -n "$DEPLOY_GITHUB_TOKEN" ]; then
            aws ssm put-parameter \
              --name "$SSM_GITHUB_TOKEN_PARAM" \
              --type SecureString \
              --value "$DEPLOY_GITHUB_TOKEN" \
              --overwrite >/dev/null
          fi

      - name: Send SSM deploy command
        id: ssm
        env:
          DEPLOY_REF: ${{ inputs.ref }}
          RUN_SETUP: ${{ inputs.run_setup }}
          RUN_DB_PUSH: ${{ inputs.run_db_push }}
          ISSUE_CERT: ${{ inputs.issue_cert }}
          SERVER_NAME: ${{ inputs.server_name }}
        run: |
          set -euo pipefail
          remote_b64="$(base64 -w 0 deploy/remote-deploy.sh)"
          setup_b64="$(base64 -w 0 deploy/setup-ec2.sh)"
          export remote_b64 setup_b64

          python3 - <<PY > /tmp/evn-ssm-commands.json
          import json, os, shlex
          remote_b64 = os.environ['remote_b64']
          setup_b64 = os.environ['setup_b64']
          remote_env = {
              'RUN_SETUP': os.environ['RUN_SETUP'],
              'RUN_DB_PUSH': os.environ['RUN_DB_PUSH'],
              'ISSUE_CERT': os.environ['ISSUE_CERT'],
              'SERVER_NAME': os.environ['SERVER_NAME'],
              'CERTBOT_EMAIL': os.environ.get('CERTBOT_EMAIL', ''),
              'DEPLOY_REF': os.environ['DEPLOY_REF'],
              'APP_DIR': os.environ['APP_DIR'],
              'REPO_URL': os.environ['REPO_URL'],
              'PM2_APP_NAME': os.environ['PM2_APP_NAME'],
              'PORT': os.environ['PORT'],
              'SSM_APP_ENV_PARAM': os.environ['SSM_APP_ENV_PARAM'],
              'SSM_GITHUB_TOKEN_PARAM': os.environ['SSM_GITHUB_TOKEN_PARAM'],
          }
          run_remote = ' '.join(f'{k}={shlex.quote(v)}' for k, v in remote_env.items()) + ' /tmp/evn-remote-deploy.sh'
          commands = [
              'set -euo pipefail',
              "cat >/tmp/evn-setup.b64 <<'EOF'\n" + setup_b64 + "\nEOF",
              "cat >/tmp/evn-remote-deploy.b64 <<'EOF'\n" + remote_b64 + "\nEOF",
              'base64 -d /tmp/evn-setup.b64 >/tmp/evn-setup.sh',
              'base64 -d /tmp/evn-remote-deploy.b64 >/tmp/evn-remote-deploy.sh',
              'chmod +x /tmp/evn-setup.sh /tmp/evn-remote-deploy.sh',
              run_remote,
          ]
          print(json.dumps({'commands': commands}))
          PY

          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "EVN-WARP deploy ${DEPLOY_REF}" \
            --timeout-seconds 3600 \
            --parameters file:///tmp/evn-ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "SSM command: $command_id"

      - name: Wait for deployment
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set +e
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"
          wait_code=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardOutputContent \
            --output text || true

          echo '--- stderr ---'
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardErrorContent \
            --output text || true

          status="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query Status --output text)"
          test "$wait_code" -eq 0
          test "$status" = Success
