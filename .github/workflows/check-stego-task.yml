name: Check STEGO Task on EC2

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Query
        id: ssm
        run: |
          cat > /tmp/check.json << 'EOF'
          {"commands": [
            "cd /opt/evn-warp",
            "node -e \"const {createClient}=require('@libsql/client');const c=createClient({url:'file:./dev.db'});(async()=>{const u=await c.execute(\\\"SELECT id,name,email,teamId FROM User WHERE name='이현수'\\\");console.log('=USER=');u.rows.forEach(r=>console.log(JSON.stringify(r)));const t=await c.execute(\\\"SELECT id,code,title,teamId,parentId,startDate,endDate FROM StrategyTask WHERE title LIKE '%STEGO%' OR title LIKE '%150%'\\\");console.log('=TASK=');t.rows.forEach(r=>console.log(JSON.stringify(r)));const taskId=t.rows[0]?.id;if(taskId){const cm=await c.execute('SELECT id,\\\"index\\\",description,startDate,endDate FROM Countermeasure WHERE taskId=? ORDER BY \\\"index\\\"',[taskId]);console.log('=CM=');cm.rows.forEach(r=>console.log(JSON.stringify(r)));}const teams=await c.execute('SELECT id,name FROM Team');console.log('=TEAMS=');teams.rows.forEach(r=>console.log(JSON.stringify(r)));})().catch(e=>console.error(e))\""
          ]}
          EOF

          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --timeout-seconds 60 \
            --parameters file:///tmp/check.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"

      - name: Get result
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          for i in $(seq 1 15); do
            status="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)"
            echo "[$i] $status"
            case "$status" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 3
          done
          echo "=== RESULT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardOutputContent --output text || true
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardErrorContent --output text || true
